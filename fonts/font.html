<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>自定义字体文本框</title>
  <style>
    @font-face {
      font-family: "MyCustomFont";
      src: url("font1.otf") format("opentype");
    }

    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f2f2f2;
    }
    h1 {
        text-align: center;
        color: #333;
        font-size: 2rem;
        margin: 20px 0;
    }
    h2 {
        text-align: center;
        color: #555;
        margin-top: 20px;
        font-size: 1.5rem;
    }
    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 20px;
    }
    ul {
        list-style-type: none;
        padding: 0;
        display: grid;
        gap: 20px;
        justify-items: center;
        margin: 30px 0;
    }
    li {
        width: 150%;
        background-color: #fff;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    li:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }
    a {
        text-decoration: none;
        font-size: 1.2rem;
        color: #007BFF;
        display: block;
        text-align: center;
    }
    a:hover {
        color: #0056b3;
    }
    .footer {
        position: absolute;
        bottom: 20px;
        font-size: 0.9rem;
        color: #888;
    }

    .controls {
      margin-bottom: 10px;
    }

    .control-group {
      margin-bottom: 10px;
    }

    .label {
      margin-right: 10px;
      font-weight: bold;
    }

    .text-box {
      font-family: "MyCustomFont", sans-serif;
      font-size: 200px;
      line-height: 1.0;
      color: #000000;
      width: 100%;
      height: 1080px;
      padding: 10px;
      border: 2px solid #ccc;
      border-radius: 10px;
      resize: both;
      box-sizing: border-box;
    }

    .description {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 30px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1><a href="../index.html">sil-calligraphy</a></h1>
  <div class="description">
    我正在制作一款基于Roundhand手写体的字体。您可以在底下的文本框中输入内容来测试！<br>

    2025/04/04：完成小写字母n和i<br>
    2025/04/05：完成小写字母a
  </div>
  <div class="controls">
    <!-- 字体大小 -->
    <div class="control-group">
      <label class="label" for="fontSize">字体大小：</label>
      <input type="range" id="fontSize" min="80" max="1000" value="200" />
      <span id="fontSizeValue">200px</span>
    </div>

    <!-- 行距 -->
    <div class="control-group">
      <label class="label" for="lineHeight">行距：</label>
      <input type="range" id="lineHeight" min="0" max="5" step="0.1" value="1" />
      <span id="lineHeightValue">1.0</span>
    </div>

    <!-- 颜色 -->
    <div class="control-group">
      <label class="label" for="fontColor">颜色：</label>
      <input type="color" id="fontColor" value="#000000" />
      <span id="fontColorValue">#000000</span>
    </div>
  </div>

  <textarea class="text-box" id="textBox" placeholder="请输入文本...">an ai na ia
nininanaiaia
nnn aaa iii</textarea>

  <script>
    const fontSizeInput = document.getElementById("fontSize");
    const fontSizeValue = document.getElementById("fontSizeValue");
    const lineHeightInput = document.getElementById("lineHeight");
    const lineHeightValue = document.getElementById("lineHeightValue");
    const fontColorInput = document.getElementById("fontColor");
    const fontColorValue = document.getElementById("fontColorValue");
    const textBox = document.getElementById("textBox");

    fontSizeInput.addEventListener("input", () => {
      const size = fontSizeInput.value;
      textBox.style.fontSize = size + "px";
      fontSizeValue.textContent = size + "px";
    });

    lineHeightInput.addEventListener("input", () => {
      const lh = lineHeightInput.value;
      textBox.style.lineHeight = lh;
      lineHeightValue.textContent = lh;
    });

    fontColorInput.addEventListener("input", () => {
      const color = fontColorInput.value;
      textBox.style.color = color;
      fontColorValue.textContent = color;
    });
  </script>

</body>
</html>
