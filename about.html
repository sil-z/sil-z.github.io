<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sil-calligraphy</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
        text-align: center;
        color: #333;
        font-size: 2rem;
        margin: 20px 0;
    }
    h2 {
        text-align: center;
        color: #555;
        margin-top: 20px;
        font-size: 1.5rem;
    }
    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 20px;
    }
    ul {
        list-style-type: none;
        padding: 0;
        display: grid;
        gap: 20px;
        justify-items: center;
        margin: 30px 0;
    }
    li {
        width: 150%;
        background-color: #fff;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    li:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }
    a {
        text-decoration: none;
        font-size: 1.2rem;
        color: #007BFF;
        display: block;
        text-align: center;
    }
    a:hover {
        color: #0056b3;
    }

    .description {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 30px;
      color: #555;
    }

    .link-box {
      background-color: #fff;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      word-break: break-word;
    }

    .link-box a {
      color: #007BFF;
      font-size: 1.1rem;
      word-wrap: break-word;
    }

    .link-box a:hover {
      color: #0056b3;
    }

    .footer {
      font-size: 0.9rem;
      color: #999;
      text-align: center;
      padding: 20px 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1><a href="index.html">sil-calligraphy</a></h1>

    <div class="description">
      这是一个英文书法爱好者随便搭的网站，用来展示一些有意思的东西。<br>
      
      这是我的小红书页面：
    </div>

    <div class="link-box">
      <a href="https://www.xiaohongshu.com/user/profile/64902425000000002b009f87" target="_blank">
        https://www.xiaohongshu.com/user/profile/64902425000000002b009f87
      </a>
    </div>
  </div>

  <div class="footer">
    
  </div>

</body>
</html>
